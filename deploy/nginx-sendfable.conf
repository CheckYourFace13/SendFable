# Sendfable — Nginx site (integrates with existing Hostinger VPS Nginx).
# Install: copy to /etc/nginx/sites-available/sendfable && ln -s to sites-enabled
# Upstream: Docker app bound to 127.0.0.1:3010 only.
# After first Certbot run, cert paths below must match /etc/letsencrypt/live/sendfable.com/

# www → apex (HTTPS)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.sendfable.com;

    ssl_certificate /etc/letsencrypt/live/sendfable.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sendfable.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://sendfable.com$request_uri;
}

# apex
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name sendfable.com;

    ssl_certificate /etc/letsencrypt/live/sendfable.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sendfable.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers (2026-07-24). CSP deferred — Next.js inline scripts
    # need nonce plumbing; revisit post-launch.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 120s;
    }
}

# HTTP → HTTPS apex
server {
    listen 80;
    listen [::]:80;
    server_name sendfable.com www.sendfable.com;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://sendfable.com$request_uri;
    }
}
